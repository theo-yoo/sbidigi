<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<title>즉시 시작 피하기 게임</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body { background-color: #111; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }

#score-board {
height: 50px;
background-color: #222;
line-height: 50px;
font-size: 1.3rem;
font-weight: bold;
color: #fbc531;
}

/* 게임 구역을 브라우저 가시화면 높이(vh)로 아예 고정 */
#game-container {
position: relative;
width: 100%;
height: calc(100vh - 50px);
background: #1a1a2e;
}

#player {
position: absolute;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
font-size: 2.5rem;
width: 50px;
height: 50px;
z-index: 5;
}

.obstacle {
position: absolute;
font-size: 2.2rem;
width: 40px;
height: 40px;
}

/* 터치 영역 패드 */
#control-zone {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
z-index: 10;
}
.touch-btn {
flex: 1;
height: 100%;
background: transparent;
border: none;
outline: none;
-webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>

<div id="score-board">점수: <span id="score">0</span></div>

<div id="game-container">
<div id="control-zone">
<div class="touch-btn" id="left-touch"></div>
<div class="touch-btn" id="right-touch"></div>
</div>
<div id="player">🚀</div>
</div>

<script>
const container = document.getElementById('game-container');
const player = document.getElementById('player');
const scoreDisplay = document.getElementById('score');

let score = 0;
let playerX = 50;
let obstacles = [];
let isGameOver = false;

// 안전하게 화면 높이를 window.innerHeight 기반으로 작동하도록 변경
let gameHeight = window.innerHeight - 50;

// 모바일 터치 이벤트 바인딩
document.getElementById('left-touch').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
document.getElementById('left-touch').addEventListener('mousedown', moveLeft);
document.getElementById('right-touch').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
document.getElementById('right-touch').addEventListener('mousedown', moveRight);

function moveLeft() {
if (isGameOver) return restartGame();
playerX -= 15;
if (playerX < 10) playerX = 10;
player.style.left = playerX + '%';
}

function moveRight() {
if (isGameOver) return restartGame();
playerX += 15;
if (playerX > 90) playerX = 90;
player.style.left = playerX + '%';
}

function spawn() {
if (isGameOver) return;

const obs = document.createElement('div');
obs.classList.add('obstacle');
obs.textContent = '☄️';

const randomX = Math.random() * 80 + 10;
obs.style.left = randomX + '%';
obs.style.top = '-50px';

container.appendChild(obs);

let obsY = -50;

// requestAnimationFrame 무한루프 버그 회피를 위해 개별 장애물 타이머 처리
let obsTimer = setInterval(() => {
if (isGameOver) {
clearInterval(obsTimer);
return;
}

obsY += 5;
obs.style.top = obsY + 'px';

// 충돌 체크
const pRect = player.getBoundingClientRect();
const oRect = obs.getBoundingClientRect();

if (oRect.left < pRect.right && oRect.right > pRect.left && oRect.top < pRect.bottom && oRect.bottom > pRect.top) {
clearInterval(obsTimer);
isGameOver = true;
player.textContent = '💥';
alert(게임 오버! 최종 점수: ${score}점\n화면을 누르면 다시 시작됩니다.);
}

// 바닥 통과
if (obsY > gameHeight) {
clearInterval(obsTimer);
obs.remove();
score += 10;
scoreDisplay.textContent = score;
}
}, 20);
}

function restartGame() {
isGameOver = false;
score = 0;
playerX = 50;
scoreDisplay.textContent = score;
player.textContent = '🚀';
player.style.left = '50%';

document.querySelectorAll('.obstacle').forEach(o => o.remove());
}

// 켜지자마자 1초마다 장애물 무조건 스폰
setInterval(spawn, 1000);

// 화면 리사이즈 대응
window.addEventListener('resize', () => {
gameHeight = window.innerHeight - 50;
});
</script>
</body>
</html>
