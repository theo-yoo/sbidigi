<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<title>접속 즉시 시작! 장애물 피하기</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
user-select: none;
}

body {
background-color: #111;
color: #fff;
font-family: sans-serif;
text-align: center;
overflow: hidden;
}

/* 상단 점수판 */
#score-board {
height: 50px;
background-color: #222;
display: flex;
justify-content: center;
align-items: center;
font-size: 1.3rem;
font-weight: bold;
color: #fbc531;
border-bottom: 2px solid #333;
}

/* 게임 화면 구역 */
#game-container {
position: relative;
width: 100%;
height: calc(100vh - 50px);
background: linear-gradient(to bottom, #111, #1a1a2e);
}

/* 플레이어 (우주선 이모지) /
#player {
position: absolute;
bottom: 40px;
left: 50%;
transform: translateX(-50%);
font-size: 2.5rem;
width: 50px;
height: 50px;
display: flex;
justify-content: center;
align-items: center;
transition: left 0.1s ease-out; / 부드러운 이동 */
}

/* 떨어지는 장애물 (운석 이모지) */
.obstacle {
position: absolute;
font-size: 2.2rem;
width: 40px;
height: 40px;
display: flex;
justify-content: center;
align-items: center;
}

/* 좌우 터치 조작 영역 (화면 전체를 반으로 쪼갬) */
#control-zone {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
z-index: 10;
}

.touch-btn {
flex: 1;
height: 100%;
background: transparent;
border: none;
outline: none;
-webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>

<div id="score-board">점수: <span id="score">0</span></div>

<div id="game-container">
<!-- 터치 구역 -->
<div id="control-zone">
<button class="touch-btn" id="left-touch"></button>
<button class="touch-btn" id="right-touch"></button>
</div>
<!-- 플레이어 -->
<div id="player">🚀</div>
</div>

<script>
const container = document.getElementById('game-container');
const player = document.getElementById('player');
const scoreDisplay = document.getElementById('score');

let score = 0;
let playerX = 50; // 플레이어 가로 위치 (%)
let obstacles = [];
let isGameOver = false;
let spawnInterval = 1200; // 장애물 생성 주기 (1.2초)
let fallSpeed = 4; // 장애물 낙하 속도

let lastSpawnTime = 0;
let lastFrameTime = 0;

// 좌우 터치/클릭 시 이동 처리 (즉시 이동)
document.getElementById('left-touch').addEventListener('touchstart', (e) => { e.preventDefault(); moveLeft(); });
document.getElementById('left-touch').addEventListener('mousedown', moveLeft);

document.getElementById('right-touch').addEventListener('touchstart', (e) => { e.preventDefault(); moveRight(); });
document.getElementById('right-touch').addEventListener('mousedown', moveRight);

function moveLeft() {
if (isGameOver) return restartGame();
playerX -= 15;
if (playerX < 10) playerX = 10;
player.style.left = playerX + '%';
}

function moveRight() {
if (isGameOver) return restartGame();
playerX += 15;
if (playerX > 90) playerX = 90;
player.style.left = playerX + '%';
}

// 장애물 스폰
function createObstacle() {
const obs = document.createElement('div');
obs.classList.add('obstacle');
obs.textContent = Math.random() > 0.5 ? '☄️' : '💥';

// 랜덤 가로 위치 (10% ~ 90%)
const randomX = Math.random() * 80 + 10;
obs.style.left = randomX + '%';
obs.style.top = '-50px';

container.appendChild(obs);
obstacles.push({ element: obs, x: randomX, y: -50 });
}

// 게임 메인 루프 (접속하자마자 자동 가동)
function updateGame(timestamp) {
if (isGameOver) return;

if (!lastFrameTime) lastFrameTime = timestamp;
if (!lastSpawnTime) lastSpawnTime = timestamp;

// 1. 장애물 주기적 생성
if (timestamp - lastSpawnTime > spawnInterval) {
createObstacle();
lastSpawnTime = timestamp;

// 난이도 상승 (점수가 오를수록 속도 업, 생성 주기 단축)
if (fallSpeed < 10) fallSpeed += 0.1;
if (spawnInterval > 500) spawnInterval -= 20;
}

// 2. 장애물 낙하 및 충돌 체크
const containerHeight = container.offsetHeight;
const playerRect = player.getBoundingClientRect();

obstacles = obstacles.filter(obs => {
obs.y += fallSpeed;
obs.element.style.top = obs.y + 'px';

// 충돌 판정 (BoundingBox 기반으로 정밀하게 체크)
const obsRect = obs.element.getBoundingClientRect();

if (
obsRect.left < playerRect.right &&
obsRect.right > playerRect.left &&
obsRect.top < playerRect.bottom &&
obsRect.bottom > playerRect.top
) {
triggerGameOver();
}

// 바닥으로 지나치면 점수 획득 및 제거
if (obs.y > containerHeight) {
obs.element.remove();
score += 10;
scoreDisplay.textContent = score;
return false;
}
return true;
});

requestAnimationFrame(updateGame);
}

// 게임오버 처리
function triggerGameOver() {
isGameOver = true;
player.textContent = '💥';
alert(게임 오버!\n최종 점수: ${score}점\n\n화면을 터치하면 카운트다운 없이 바로 재시작됩니다.);
}

// 재시작 (터치 즉시 재가동)
function restartGame() {
isGameOver = false;
score = 0;
playerX = 50;
spawnInterval = 1200;
fallSpeed = 4;
scoreDisplay.textContent = score;
player.textContent = '🚀';
player.style.left = '50%';

// 기존 장애물 싹 제거
obstacles.forEach(obs => obs.element.remove());
obstacles = [];

lastSpawnTime = 0;
lastFrameTime = 0;
requestAnimationFrame(updateGame);
}

// 🌟 [핵심] 페이지 접속 완료되면 버튼 대기 없이 즉시 게임 루프 작동!
window.onload = function() {
requestAnimationFrame(updateGame);
};
</script>
</body>
</html>
