<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<title>유과장의 출근길</title>
<style>
/* 모바일 최적화 스크롤 및 바운스 원천 차단 */
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
html, body { background-color: #1e272e; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; position: fixed; width: 100%; height: 100%; }

#score-board {
height: 50px;
line-height: 50px;
font-size: 1.2rem;
background: #2f3640;
color: #fbc531;
font-weight: bold;
border-bottom: 3px solid #485460;
}

/* 지하철 내부 느낌의 좁은 게임 화면 구역 /
#subway-line {
position: relative;
width: 100%;
height: calc(100% - 50px);
background: linear-gradient(to bottom, #718093, #2f3640);
border-left: 20px solid #485460; / 지하철 벽면 연출 */
border-right: 20px solid #485460;
}

/* 유과장 캐릭터 */
#yoo-manager {
position: absolute;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
font-size: 2.3rem;
width: 45px;
height: 45px;
z-index: 10;
transition: left 0.08s ease-out;
}

/* 몰려오는 출근길 사람들 (이모지) */
.people { position: absolute; font-size: 2rem; width: 35px; height: 35px; z-index: 5; }

/* 좌우 터치 패드 (전체 화면의 50%씩 분할) */
#left-pad, #right-pad { position: absolute; top: 0; width: 50%; height: 100%; z-index: 20; -webkit-tap-highlight-color: transparent; }
#left-pad { left: 0; }
#right-pad { right: 0; }
</style>
</head>
<body>

<div id="score-board">출근 거리: <span id="score">0</span>m</div>

<div id="subway-line">
<div id="left-pad"></div>
<div id="right-pad"></div>

<div id="yoo-manager">🏃‍♂️</div>
</div>

<script>
const subway = document.getElementById('subway-line');
const yoo = document.getElementById('yoo-manager');
const scoreDisplay = document.getElementById('score');

let score = 0;
let yooX = 50; // 유과장 위치 (%)
let isGameOver = false;
let speed = 6; // 사람들의 돌진 속도

// 터치 이벤트 직빵 연결 (모바일/PC 공용)
document.getElementById('left-pad').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(-20); });
document.getElementById('right-pad').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(20); });
document.getElementById('left-pad').addEventListener('mousedown', () => movePlayer(-20));
document.getElementById('right-pad').addEventListener('mousedown', () => movePlayer(20));

function movePlayer(dir) {
if (isGameOver) return restartGame();

// 좁은 지하철 벽 안에서만 움직이도록 제한 (20% ~ 80%)
yooX = Math.max(20, Math.min(80, yooX + dir));
yoo.style.left = yooX + '%';
}

// 출근길 인파 생성
const crowdEmojis = ['🧍', '🧳', '📱', '🎒', '👨‍💼', '👩‍💼'];

function spawnPeople() {
if (isGameOver) return;

const npc = document.createElement('div');
npc.className = 'people';
npc.textContent = crowdEmojis[Math.floor(Math.random() * crowdEmojis.length)];

// 승객 등장 가로 위치 무작위 (지하철 내부 구역만)
let randomX = Math.random() * 55 + 22;
npc.style.left = randomX + '%';
npc.style.top = '-40px';
subway.appendChild(npc);

let npcY = -40;

// 개별 인터벌 타이머로 브라우저 무한루프 오류 차단
let npcTimer = setInterval(() => {
if (isGameOver) {
clearInterval(npcTimer);
return;
}

npcY += speed;
npc.style.top = npcY + 'px';

// 초정밀 충돌 감지 연산
let pRect = yoo.getBoundingClientRect();
let nRect = npc.getBoundingClientRect();

if (nRect.left < pRect.right && nRect.right > pRect.left && nRect.top < pRect.bottom && nRect.bottom > pRect.top) {
isGameOver = true;
clearInterval(npcTimer);
yoo.textContent = '💥';

// 지각 확정 알림
setTimeout(() => {
alert(지각 확정!\n\n유과장이 사람들에게 치여 넘어졌습니다.\n최종 출근 거리: ${score}m\n\n화면을 누르면 다시 출근합니다.);
}, 50);
}

// 무사히 유과장을 지나치면 점수 획득
if (npcY > subway.offsetHeight) {
clearInterval(npcTimer);
npc.remove();
score += 10;
scoreDisplay.textContent = score;

// 멀리 갈수록 사람들이 조금씩 더 빨리 다가옴 (난이도 향상)
if (speed < 15) speed += 0.1;
}
}, 20);
}

function restartGame() {
isGameOver = false;
score = 0;
yooX = 50;
speed = 6;
scoreDisplay.textContent = '0';
yoo.textContent = '🏃‍♂️';
yoo.style.left = '50%';

// 남아있던 사람들 싹 퇴근시키기
document.querySelectorAll('.people').forEach(p => p.remove());
}

// 켜자마자 0.9초마다 사람 한 명씩 자동 돌진 시작! (버튼 원천 봉쇄)
setInterval(spawnPeople, 900);
</script>
</body>
</html>
