<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>유과장의 출근길</title>

<style>
• {
margin: 0;
padding: 0;
box-sizing: border-box;
touch-action: manipulation;
user-select: none;
}

body {
overflow: hidden;
background: #111;
font-family: sans-serif;
}

#game {
width: 100vw;
height: 100vh;
display: block;
background: linear-gradient(#1b1b1b, #303030);
}

#ui {
position: fixed;
top: 15px;
left: 15px;
color: white;
font-size: 22px;
z-index: 10;
}

#overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,.85);
display: none;
justify-content: center;
align-items: center;
z-index: 20;
}

#panel {
text-align: center;
color: white;
}

#panel h1 {
margin-bottom: 12px;
font-size: 42px;
}

#panel p {
margin-bottom: 24px;
font-size: 24px;
}

button {
border: none;
padding: 18px 30px;
border-radius: 12px;
font-size: 22px;
background: #00c853;
color: white;
}
</style>
</head>

<body>

<div id="ui">
출근 거리: <span id="score">0</span>m
</div>

<canvas id="game"></canvas>

<div id="overlay">
<div id="panel">
<h1>지각 확정! 💥</h1>
<p id="finalScore"></p>
<button onclick="restart()">다음 날 출근</button>
</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
canvas.width = innerWidth;
canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const lanes = [0.25, 0.5, 0.75];

const villains = ["🎒","🧳","📱","☂️","☕"];

let player;
let obstacles;
let score;
let speed;
let gameOver;
let spawnTimer;

function init() {
player = {
lane: 1,
size: 42
};

obstacles = [];
score = 0;
speed = 8;
spawnTimer = 0;
gameOver = false;

document.getElementById("overlay").style.display = "none";
}

function spawnObstacle() {
obstacles.push({
lane: Math.floor(Math.random() * 3),
y: -60,
icon: villains[Math.floor(Math.random() * villains.length)]
});
}

function update() {

if (gameOver) return;

score += 0.4;
speed += 0.0005;

document.getElementById("score").textContent =
Math.floor(score);

spawnTimer++;

if (spawnTimer > 45) {
spawnObstacle();
spawnTimer = 0;
}

for (let i = obstacles.length - 1; i >= 0; i--) {

obstacles[i].y += speed;

if (obstacles[i].y > canvas.height + 60) {
obstacles.splice(i, 1);
continue;
}

const px = canvas.width * lanes[player.lane];
const py = canvas.height - 120;

const ox = canvas.width * lanes[obstacles[i].lane];

if (
Math.abs(px - ox) < 30 &&
Math.abs(py - obstacles[i].y) < 40
) {
endGame();
}
}
}

function drawTrack() {

ctx.fillStyle = "#222";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.strokeStyle = "#666";
ctx.lineWidth = 6;

for (let i = 1; i <= 2; i++) {

const x = canvas.width * (i / 3);

ctx.beginPath();
ctx.moveTo(x, 0);
ctx.lineTo(x, canvas.height);
ctx.stroke();
}
}

function draw() {

drawTrack();

ctx.font = "48px serif";
ctx.textAlign = "center";

const px = canvas.width * lanes[player.lane];
const py = canvas.height - 120;

ctx.fillText("🏃‍♂️", px, py);

obstacles.forEach(o => {
ctx.fillText(
o.icon,
canvas.width * lanes[o.lane],
o.y
);
});
}

function loop() {
update();
draw();
requestAnimationFrame(loop);
}

function endGame() {

gameOver = true;

document.getElementById("finalScore").textContent =
출근 거리 ${Math.floor(score)}m;

document.getElementById("overlay").style.display =
"flex";
}

function restart() {
init();
}

document.addEventListener("pointerdown", e => {

if (gameOver) return;

if (e.clientX < innerWidth / 2) {
player.lane = Math.max(0, player.lane - 1);
} else {
player.lane = Math.min(2, player.lane + 1);
}
});

init();
loop();
</script>

</body>
</html>
