<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<title>초간단 피하기 게임</title>
<style>
/* 화면을 스마트폰 크기에 고정하고 스크롤 차단 */
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body { background-color: #111; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; position: fixed; width: 100%; height: 100%; }

#score-board { height: 50px; line-height: 50px; font-size: 1.3rem; background: #222; color: #fbc531; font-weight: bold; }
#game-board { position: relative; width: 100%; height: calc(100% - 50px); background: #1a1a2e; }

/* 주인공 우주선 (위치는 % 단위로 제어) */
#player { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; width: 50px; height: 50px; z-index: 10; }

/* 떨어지는 똥/운석 */
.enemy { position: absolute; font-size: 2.2rem; width: 40px; height: 40px; z-index: 5; }

/* 화면을 반으로 나눠서 왼쪽/오른쪽 터치 패드로 사용 */
#left-pad, #right-pad { position: absolute; top: 0; width: 50%; height: 100%; z-index: 20; -webkit-tap-highlight-color: transparent; }
#left-pad { left: 0; }
#right-pad { right: 0; }
</style>
</head>
<body>

<div id="score-board">점수: <span id="score">0</span></div>

<div id="game-board">
<!-- 터치 구역 -->
<div id="left-pad"></div>
<div id="right-pad"></div>

<!-- 플레이어 -->
<div id="player">🚀</div>
</div>

<script>
const gameBoard = document.getElementById('game-board');
const player = document.getElementById('player');
const scoreDisplay = document.getElementById('score');

let score = 0;
let playerX = 50; // 플레이어의 현재 가로 위치 (50%)
let isGameOver = false;

// 📱 모바일 터치 및 PC 클릭 이벤트 직접 연결
document.getElementById('left-pad').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(-15); });
document.getElementById('right-pad').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(15); });
document.getElementById('left-pad').addEventListener('mousedown', () => movePlayer(-15));
document.getElementById('right-pad').addEventListener('mousedown', () => movePlayer(15));

function movePlayer(offset) {
if (isGameOver) {
restartGame();
return;
}
// 플레이어가 화면 밖으로 나가지 않게 최소 15% ~ 최대 85% 제한
playerX = Math.max(15, Math.min(85, playerX + offset));
player.style.left = playerX + '%';
}

// 장애물 떨어뜨리는 기초 함수
function spawnEnemy() {
if (isGameOver) return;

const enemy = document.createElement('div');
enemy.className = 'enemy';
enemy.textContent = '💩'; // 떨어지는 장애물

// 랜덤 가로 위치 지정 (15% ~ 85%)
let enemyX = Math.random() * 70 + 15;
enemy.style.left = enemyX + '%';
enemy.style.top = '-50px';
gameBoard.appendChild(enemy);

let enemyY = -50;

// 0.02초마다 장애물을 아래로 이동시키는 타이머
let enemyTimer = setInterval(() => {
if (isGameOver) {
clearInterval(enemyTimer);
return;
}

enemyY += 7; // 낙하 속도
enemy.style.top = enemyY + 'px';

// 💥 초간단 기초 충돌 계산 (가로 위치와 세로 위치가 겹치면 부딪힌 걸로 간주)
let playerRect = player.getBoundingClientRect();
let enemyRect = enemy.getBoundingClientRect();

if (
enemyRect.bottom > playerRect.top &&
enemyRect.top < playerRect.bottom &&
Math.abs((enemyX) - (playerX)) < 12 // 가로 % 위치가 12% 이내로 가까워지면 충돌
) {
isGameOver = true;
clearInterval(enemyTimer);
player.textContent = '💥';
alert(게임 오버!\n최종 점수: ${score}점\n\n화면을 아무 데나 누르면 다시 시작합니다.);
}

// 바닥을 완전히 통과하면 점수 획득 후 삭제
if (enemyY > gameBoard.offsetHeight) {
clearInterval(enemyTimer);
enemy.remove();
score += 10;
scoreDisplay.textContent = score;
}
}, 20);
}

// 게임 재시작 함수
function restartGame() {
isGameOver = false;
score = 0;
playerX = 50;
scoreDisplay.textContent = '0';
player.textContent = '🚀';
player.style.left = '50%';

// 화면에 남아있는 똥 전부 삭제
document.querySelectorAll('.enemy').forEach(e => e.remove());
}

// 접속하자마자 1초(1000ms)마다 장애물을 자동으로 하나씩 떨어뜨림
setInterval(spawnEnemy, 1000);
</script>
</body>
</html>
