<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>악마 두더지를 잡아라! (Devil Mole)</title>
<style>
/* 전체 스타일 리셋 및 배경 /
* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Arial', sans-serif;
user-select: none;
}
body {
background-color: #1a1a2e;
color: #fff;
text-align: center;
padding: 20px;
/ 마우스 커서를 이모지 망치 모양으로 변경 /
cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' style='font-size:30px'><text y='30'>🔨</text></svg>"), auto;
}
body:active {
/ 클릭 시 망치가 때리는 각도로 살짝 회전 */
cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' style='font-size:30px;transform:rotate(-20deg)'><text y='30'>🔨</text></svg>"), auto;
}

h1 {
color: #ff4757;
margin-bottom: 10px;
font-size: 2.5rem;
text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
}

.desc {
font-size: 1.1rem;
color: #a4b0be;
margin-bottom: 20px;
}

/* 대시보드 (점수, 시간 표시) */
.dashboard {
display: flex;
justify-content: center;
gap: 30px;
font-size: 1.3rem;
font-weight: bold;
margin-bottom: 20px;
}
.score-box { color: #2ed573; }
.high-box { color: #eccc68; }
.time-box { color: #ff6348; }

/* 게임 시작 버튼 */
.start-btn {
padding: 12px 30px;
font-size: 1.2rem;
font-weight: bold;
background-color: #ff4757;
color: white;
border: none;
border-radius: 8px;
cursor: pointer;
transition: 0.2s;
margin-bottom: 20px;
box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
}
.start-btn:hover {
background-color: #ff6b81;
transform: scale(1.05);
}

/* 3x3 게임판 구조 */
.game-board {
display: grid;
grid-template-columns: repeat(3, 1fr);
grid-template-rows: repeat(3, 1fr);
gap: 15px;
max-width: 450px;
margin: 0 auto;
background-color: #16a085;
padding: 20px;
border-radius: 15px;
box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 25px rgba(0,0,0,0.5);
}

/* 두더지 구멍 */
.hole {
background-color: #117a65;
height: 110px;
border-radius: 50%;
position: relative;
overflow: hidden;
border-bottom: 8px solid #0e6251;
box-shadow: inset 0 8px 10px rgba(0,0,0,0.6);
}

/* 구멍 내부의 두더지 기본 상태 (아래에 숨어있음) /
.mole {
position: absolute;
width: 100%;
height: 100%;
top: 100%; / 숨김 /
left: 0;
font-size: 55px;
display: flex;
align-items: center;
justify-content: center;
transition: top 0.12s ease-out; / 튀어나오는 속도 */
cursor: pointer;
}

/* 두더지가 올라왔을 때 클래스 */
.hole.active .mole {
top: 10%;
}

/* 착한 놈, 나쁜 놈 이모지 설정 */
.hole.devil .mole::after { content: "😈"; }
.hole.angel .mole::after { content: "😇"; }

/* 이펙트: 타격 시 피드백 애니메이션 */
@keyframes hit-flash {
0% { background-color: rgba(46, 213, 115, 0.4); }
100% { background-color: transparent; }
}
@keyframes penalty-flash {
0% { background-color: rgba(255, 71, 87, 0.5); }
100% { background-color: transparent; }
}
.hit-success { animation: hit-flash 0.2s ease-out; }
.hit-penalty { animation: penalty-flash 0.3s ease-out; }

</style>
</head>
<body>

<h1>😈 악마 두더지 소탕 작전!</h1>
<p class="desc">착한 두더지(😇)를 때리면 점수가 깎이니 조심해!</p>

<div class="dashboard">
<div class="score-box">현재 점수: <span id="score">0</span></div>
<div class="high-box">최고 점수: <span id="high-score">0</span></div>
<div class="time-box">남은 시간: <span id="time">30</span>초</div>
</div>

<button class="start-btn" onclick="startGame()">게임 시작</button>

<div class="game-board">
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
<div class="hole" onclick="hitMole(event)"><div class="mole"></div></div>
</div>

<script>
const holes = document.querySelectorAll('.hole');
const scoreDisplay = document.getElementById('score');
const highScoreDisplay = document.getElementById('high-score');
const timeDisplay = document.getElementById('time');
const startBtn = document.querySelector('.start-btn');

let score = 0;
let timeLeft = 30;
let isPlaying = false;
let lastHole;
let gameTimer;
let spawnTimer;
let currentSpeed = 1000; // 초기 두더지 등장 속도 (1초)

// 브라우저 캐시에서 최고 점수 불러오기
let highScore = localStorage.getItem('moleHighScore') || 0;
highScoreDisplay.textContent = highScore;

// 무작위 구멍 고르기 (연속으로 같은 구멍 안 나오게)
function randomHole(holes) {
const idx = Math.floor(Math.random() * holes.length);
const hole = holes[idx];
if (hole === lastHole) return randomHole(holes);
lastHole = hole;
return hole;
}

// 게임 시작 함수
function startGame() {
if (isPlaying) return;

// 초기화
isPlaying = true;
score = 0;
timeLeft = 30;
currentSpeed = 1000;
scoreDisplay.textContent = score;
timeDisplay.textContent = timeLeft;
startBtn.style.display = 'none'; // 게임 중엔 시작버튼 숨기기

// 구멍 초기화
holes.forEach(hole => hole.classList.remove('active', 'devil', 'angel'));

// 1초마다 남은 시간 감소 및 난이도 상승 촉진
gameTimer = setInterval(() => {
timeLeft--;
timeDisplay.textContent = timeLeft;

// 10초 남았을 때 속도 대폭 상승 (스릴 유발)
if (timeLeft === 20) adjustSpeed(750);
if (timeLeft === 10) adjustSpeed(550);

if (timeLeft <= 0) {
endGame();
}
}, 1000);

// 두더지 루프 시작
runGame();
}

// 속도 조절 및 타이머 재시작
function adjustSpeed(newSpeed) {
currentSpeed = newSpeed;
clearInterval(spawnTimer);
runGame();
}

// 두더지 출현 반복 제어 루프
function runGame() {
if (!isPlaying) return;

spawnMole();

// 난이도에 맞춰 유동적인 타임아웃 계산
spawnTimer = setInterval(() => {
if (!isPlaying) return;
spawnMole();
}, currentSpeed);
}

// 두더지 스폰 로직
function spawnMole() {
const hole = randomHole(holes);

// 이미 켜져 있다면 패스
if (hole.classList.contains('active')) return;

// 65% 확률로 악마(😈), 35% 확률로 천사(😇) 등장
const isDevil = Math.random() < 0.65;

hole.classList.add('active');
hole.classList.add(isDevil ? 'devil' : 'angel');

// 일정 시간 지나면 쏙 들어가게 처리
setTimeout(() => {
hole.classList.remove('active', 'devil', 'angel');
}, currentSpeed * 0.85);
}

// 클릭 판정 및 점수 계산
function hitMole(e) {
if (!isPlaying) return;

const hole = e.currentTarget;

// 두더지가 안 올라와 있으면 무효
if (!hole.classList.contains('active')) return;

if (hole.classList.contains('devil')) {
// 악마 처단 성공
score += 10;
hole.classList.add('hit-success');
setTimeout(() => hole.classList.remove('hit-success'), 200);
} else if (hole.classList.contains('angel')) {
// 착한 애 때림 (페널티 폭탄)
score -= 15;
hole.classList.add('hit-penalty');
setTimeout(() => hole.classList.remove('hit-penalty'), 300);
}

// 맞았으므로 즉시 들어가게 처리
hole.classList.remove('active', 'devil', 'angel');
scoreDisplay.textContent = score;
}

// 게임 종료 처리
function endGame() {
isPlaying = false;
clearInterval(gameTimer);
clearInterval(spawnTimer);

startBtn.style.display = 'inline-block';
startBtn.textContent = '다시 도전하기';

// 최고 점수 갱신 및 저장
if (score > highScore) {
highScore = score;
highScoreDisplay.textContent = highScore;
localStorage.setItem('moleHighScore', highScore);
alert(🎉 축하합니다! 최고 점수 경신: ${score}점!); } else { alert(게임 오버! 최종 점수: ${score}점);
}
}
</script>
</body>
</html>
